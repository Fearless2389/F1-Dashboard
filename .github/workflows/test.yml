name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run pytest
        env:
          F1ML_DISABLE_REFRESHER: "1"
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install
      # Type-check is now its own job so CI surfaces tsc / eslint errors
      # separately. ESLint enforces the React Doctor catches that bit us
      # before — rules-of-hooks, button-has-type, no-unstable-nested-components —
      # at error level. Warnings are capped at 200 so we can ratchet down.
      - name: Type-check
        working-directory: web
        run: pnpm typecheck
      - name: Lint
        working-directory: web
        run: pnpm lint
      - name: Unit tests
        working-directory: web
        run: pnpm test -- --run
