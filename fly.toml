# Fly.io config for the Paddock Dashboard backend.
#
# Bootstrap:
#   fly launch --copy-config --no-deploy        # first time only
#   fly volumes create paddock_data --size 5    # 5 GB volume (~3 GB used)
#   fly secrets set FRONTEND_ORIGIN=https://paddock-yourdomain.pages.dev
#   fly deploy
#
# After first deploy, populate the volume from your local machine:
#   fly ssh sftp shell -a paddock-api
#   put -r data /data           # copies models + parquet + FastF1 cache (~3 GB)
#
# Frontend ships separately to Cloudflare Pages or Vercel pointing at
# https://paddock-api.fly.dev via VITE_API_PROXY at build time.

app = "paddock-api"
primary_region = "iad"   # change to "fra" / "sin" / etc to be closer to users
kill_signal = "SIGINT"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # Refresher is light but only valuable on a long-lived single instance.
  # Disable on Fly free-tier machines that suspend often — the cron firing
  # against suspended http endpoints just wastes wakeups.
  F1ML_DISABLE_REFRESHER = "0"

# 5 GB volume — about 60% headroom over the current 3 GB of data.
[mounts]
  source = "paddock_data"
  destination = "/app/data"

# Single shared-CPU machine with 1 GB RAM. The warm-up thread loads all six
# trained .pkl models (~150 MB resident) plus the aligned parquet (~50 MB),
# so 512 MB is too tight in practice.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8000
  force_https = true
  # Auto-stop on idle so you don't burn credits at 3am. Cold start with the
  # warm-up thread takes ~5–8 seconds — acceptable for a portfolio dashboard.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/api/health"
